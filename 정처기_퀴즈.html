<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정처기 실기 학습</title>
<style>
  :root {
    --bg: #F9FAFB;
    --card: #FFFFFF;
    --border: #E5E8EB;
    --border-light: #F2F4F6;
    --text-primary: #191F28;
    --text-secondary: #4E5968;
    --text-tertiary: #8B95A1;
    --blue: #3182F6;
    --blue-light: #E8F3FF;
    --green: #00C471;
    --green-light: #E6F9F1;
    --red: #F04452;
    --red-light: #FEECEC;
    --yellow: #FFB800;
    --gray: #F2F4F6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    letter-spacing: -0.02em;
  }

  .app-nav {
    background: var(--card);
    border-bottom: 1px solid var(--border-light);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .app-nav-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 60px;
    gap: 8px;
  }
  .app-logo {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    margin-right: auto;
  }
  .nav-btn {
    padding: 8px 16px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--gray); color: var(--text-secondary); }
  .nav-btn.active { color: var(--blue); background: var(--blue-light); }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .page-header { margin-bottom: 28px; }
  .page-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 14px;
    color: var(--text-tertiary);
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-item {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .stat-value.v-correct { color: var(--green); }
  .stat-value.v-wrong { color: var(--red); }
  .progress-bar {
    height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    transition: width 0.3s;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text-secondary); }
  .tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--text-primary);
  }

  .chips {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 7px 13px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--gray);
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--border-light); }
  .chip.active { background: var(--text-primary); color: #fff; }
  .chip .count {
    opacity: 0.6;
    font-size: 11px;
    margin-left: 3px;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .q-card.is-correct { border-color: var(--green); }
  .q-card.is-wrong { border-color: var(--red); }

  .q-meta {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .q-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-tertiary);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--gray);
    color: var(--text-secondary);
  }
  .badge.bg-blue { background: var(--blue-light); color: var(--blue); }
  .badge.bg-red { background: var(--red-light); color: var(--red); }
  .badge.bg-green { background: var(--green-light); color: var(--green); }
  .badge.bg-yellow { background: #FFF8E1; color: #B07500; }
  .badge.bg-gray { background: var(--gray); color: var(--text-secondary); }

  .q-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-primary);
    margin-bottom: 14px;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .q-text code, .q-text pre {
    font-family: 'SF Mono', Menlo, Monaco, monospace;
    font-size: 13px;
  }
  .q-text code {
    background: var(--gray);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-primary);
  }
  .q-text pre {
    background: #F7F8FA;
    padding: 12px 14px;
    border-radius: 8px;
    margin-top: 8px;
    overflow-x: auto;
    line-height: 1.5;
    color: var(--text-primary);
  }

  .input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--card);
    color: var(--text-primary);
    transition: border-color 0.15s;
  }
  .input::placeholder { color: var(--text-tertiary); }
  .input:focus { outline: none; border-color: var(--blue); }
  textarea.input { min-height: 76px; resize: vertical; }

  .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .btn {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--text-primary); color: #fff; }
  .btn-primary:hover { background: #000; }
  .btn-secondary { background: var(--gray); color: var(--text-secondary); }
  .btn-secondary:hover { background: var(--border-light); }
  .btn-ghost { background: none; color: var(--text-tertiary); }
  .btn-ghost:hover { color: var(--text-secondary); }

  .result {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 10px;
    display: none;
    background: var(--gray);
  }
  .result.show { display: block; }
  .result.r-correct { background: var(--green-light); }
  .result.r-wrong { background: var(--red-light); }
  .r-status {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .r-correct .r-status { color: var(--green); }
  .r-wrong .r-status { color: var(--red); }
  .r-line {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-top: 6px;
  }
  .r-line strong { color: var(--text-primary); }
  .r-answer {
    padding: 10px 12px;
    background: var(--card);
    border-radius: 8px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .r-explain {
    padding: 10px 12px;
    background: var(--card);
    border-radius: 8px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .r-explain strong { color: var(--text-primary); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    font-size: 14px;
  }
  .sub-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    margin: 6px 0 6px;
    padding: 0 4px;
  }

  @media (max-width: 640px) {
    .container { padding: 20px 16px 60px; }
    .page-title { font-size: 22px; }
    .app-nav-inner { padding: 0 16px; }
    .q-card { padding: 18px; }
  }
</style>
</head>
<body>

<nav class="app-nav">
  <div class="app-nav-inner">
    <div class="app-logo">정처기 실기</div>
    <button class="nav-btn" id="navQuiz">퀴즈</button>
    <button class="nav-btn" id="navPast">기출문제</button>
    <button class="nav-btn" id="navReview">복습</button>
  </div>
</nav>

<main class="container" id="app"></main>

<script>
/* ============================================================
   QUIZ DATA (과목별 30문제)
============================================================ */
const quizData = {
  "DB": [
    {type:"short", prob:"p99", q:"특정 조건을 만족하는 중복을 제외한 값의 개수를 구할 때 사용하는 SQL 키워드는?", a:"DISTINCT", e:"<strong>SELECT COUNT(DISTINCT 컬럼명) FROM 테이블;</strong> → 컬럼 값에서 중복 제외한 튜플 개수 반환"},
    {type:"short", prob:"past", q:"SQL DML(데이터 조작어) 명령어 4가지를 모두 쓰시오.", a:"SELECT, INSERT, UPDATE, DELETE", e:"<strong>DML</strong>: SELECT/INSERT/UPDATE/DELETE<br><strong>DDL</strong>: CREATE/ALTER/DROP<br><strong>DCL</strong>: GRANT/REVOKE/COMMIT/ROLLBACK"},
    {type:"short", prob:"past", q:"테이블 제거 시 참조 중인 테이블이 있으면 삭제를 불가능하게 하는 옵션은?", a:"RESTRICT", e:"<strong>DROP TABLE 테이블 RESTRICT;</strong> → 참조 중이면 삭제 불가<br><strong>DROP TABLE 테이블 CASCADE;</strong> → 참조 테이블까지 삭제"},
    {type:"short", prob:"past", q:"테이블에 새로운 행(데이터)을 추가하는 SQL 구문 형식을 쓰시오.", a:"INSERT INTO 테이블(컬럼1, 컬럼2) VALUES(값1, 값2);", e:"컬럼명은 생략 가능: <code>INSERT INTO 테이블 VALUES(값1, 값2);</code>"},
    {type:"short", prob:"past", q:"테이블의 컬럼 값을 조건에 맞게 수정하는 SQL 구문 형식은?", a:"UPDATE 테이블 SET 컬럼=값 WHERE 조건;", e:"WHERE 절을 생략하면 전체 행이 수정되므로 주의."},
    {type:"short", prob:"past", q:"사용자에게 권한(SELECT, INSERT 등)을 부여하는 DCL 명령어는?", a:"GRANT", e:"<strong>GRANT</strong>: 권한 부여 (ON 테이블 TO 사용자)<br><strong>REVOKE</strong>: 권한 회수"},
    {type:"short", prob:"past", q:"뷰(VIEW)를 생성하는 SQL 구문 형식은?", a:"CREATE VIEW 뷰이름 AS SELECT 컬럼1, 컬럼2 FROM 테이블 WHERE 조건;", e:"뷰 제거: <code>DROP VIEW 뷰이름 RESTRICT|CASCADE;</code>"},
    {type:"short", prob:"past", q:"이름이 '김'으로 시작하는 데이터를 조회하는 WHERE 조건절을 쓰시오.", a:"WHERE 이름 LIKE '김%'", e:"<code>'김%'</code>: 김으로 시작<br><code>'%김%'</code>: 김 포함<br><code>'_김'</code>: 앞 한 글자 + 김"},
    {type:"short", prob:"past", q:"GROUP BY로 그룹화한 결과에 조건을 적용할 때 사용하는 절은?", a:"HAVING", e:"<strong>WHERE</strong>: 그룹화 전 조건<br><strong>HAVING</strong>: 그룹화 후 조건"},
    {type:"short", prob:"p99", q:"테이블에 새로운 컬럼을 추가하는 SQL 구문 형식은?", a:"ALTER TABLE 테이블 ADD 컬럼이름 데이터타입;", e:"컬럼 제거: <code>ALTER TABLE 테이블 DROP COLUMN 컬럼이름;</code>"},
    {type:"short", prob:"p99", q:"두 테이블에서 조건을 만족하는 튜플만 반환하는 가장 기본적인 조인 방식의 명칭 2가지는?", a:"INNER JOIN (내부 조인) / 세타 조인", e:"<strong>INNER JOIN</strong>: 조건 만족 튜플만<br><strong>동등 조인</strong>: 등호(=)만 사용하는 세타 조인"},
    {type:"short", prob:"p99", q:"두 테이블의 공통 속성을 기준으로 조인하되, 중복 속성을 제거하는 조인은?", a:"NATURAL JOIN (자연 조인)", e:"<code>SELECT 컬럼 FROM 테이블1 NATURAL JOIN 테이블2;</code>"},
    {type:"short", prob:"p99", q:"조건에 일치하지 않는 튜플도 NULL로 채워 반환하는 조인 방식은?", a:"OUTER JOIN (외부 조인)", e:"<strong>LEFT</strong>: 왼쪽 기준 / <strong>RIGHT</strong>: 오른쪽 기준 / <strong>FULL OUTER</strong>: 양쪽 모두"},
    {type:"short", prob:"past", q:"두 테이블을 중복을 포함하여 합치는 집합 연산자는?", a:"UNION ALL", e:"<strong>UNION</strong>: 중복 제거 합집합<br><strong>INTERSECT</strong>: 교집합<br><strong>EXCEPT(MINUS)</strong>: 차집합"},
    {type:"short", prob:"past", q:"두 테이블에서 공통으로 존재하는 튜플만 반환하는 집합 연산자는?", a:"INTERSECT", e:"교집합 연산자. 두 쿼리 결과에 동시에 존재하는 튜플만 반환."},
    {type:"desc", prob:"past", q:"스키마 3가지 종류를 쓰고 각각을 간단히 설명하시오.", a:"외부 스키마, 개념 스키마, 내부 스키마", e:"<strong>외부</strong>: 사용자 관점, 사용자 뷰<br><strong>개념</strong>: 전체 뷰, 개체 관계/제약<br><strong>내부</strong>: 저장장치 관점"},
    {type:"desc", prob:"past", q:"트랜잭션의 4가지 특성(ACID)을 쓰고 각각 설명하시오.", a:"원자성(Atomicity), 일관성(Consistency), 고립성(Isolation), 지속성(Durability)", e:"<strong>원자성</strong>: All or Nothing<br><strong>일관성</strong>: 실행 후 일관성 유지<br><strong>고립성</strong>: 동시 실행 제어<br><strong>지속성</strong>: 완료 결과 영구 저장"},
    {type:"short", prob:"past", q:"회복 기법 중 시작(Start)과 완료(Commit) 기록이 모두 있을 때 다시 실행하여 복구하는 기법은?", a:"Redo (재실행)", e:"<strong>Redo</strong>: Start/Commit 모두 존재 → 재실행<br><strong>Undo</strong>: Start만 있음 → 취소"},
    {type:"short", prob:"p80", q:"동시성 제어에서 여러 트랜잭션이 동시에 읽기는 가능하지만 쓰기는 불가능한 락은?", a:"S-Lock (공유 락)", e:"<strong>S-Lock</strong>: 공유, 동시 읽기O/쓰기X<br><strong>X-Lock</strong>: 배타, 읽기/쓰기 독점"},
    {type:"desc", prob:"p20", q:"관계 대수 순수 관계 연산자 4가지를 기호와 함께 쓰시오.", a:"Select(σ), Project(π), Join(⋈), Division(÷)", e:"<strong>σ</strong>: 조건 만족 튜플(수평)<br><strong>π</strong>: 조건 만족 속성(수직)<br><strong>⋈</strong>: 공통 속성 결합<br><strong>÷</strong>: 디비전"},
    {type:"short", prob:"p20", q:"릴레이션의 한 행(Row)이며 중복을 포함할 수 있는 구성요소의 명칭은?", a:"Tuple (튜플) / Record", e:"<strong>Tuple</strong>=행, <strong>Cardinality</strong>=튜플 수, <strong>Degree</strong>=속성 수, <strong>Domain</strong>=속성 값 집합"},
    {type:"short", prob:"p20", q:"릴레이션에서 데이터 집합 내 고유한 총 개수(튜플 수)를 의미하는 용어는?", a:"Cardinality (카디널리티)", e:"튜플(Tuple)의 수. Degree는 속성(컬럼)의 수."},
    {type:"desc", prob:"p80", q:"데이터 모델 구성요소 3가지를 쓰시오.", a:"구조(Structure), 연산(Operation), 제약조건(Constraint)", e:"<strong>구조</strong>: 타입/관계 정의<br><strong>연산</strong>: 처리/검색 방법<br><strong>제약조건</strong>: 무결성 유지"},
    {type:"desc", prob:"past", q:"DB 설계 4단계(요개논물)를 순서대로 쓰시오.", a:"요구조건 분석 → 개념적 설계 → 논리적 설계 → 물리적 설계", e:"<strong>요구조건</strong>: 명세서<br><strong>개념</strong>: ERD<br><strong>논리</strong>: 스키마/정규화<br><strong>물리</strong>: 저장 구조"},
    {type:"short", prob:"past", q:"모든 속성이 원자값(Atomic value)만을 가지는 정규형은?", a:"제1정규형 (1NF)", e:"도메인이 원자값, 반복 그룹 없음."},
    {type:"short", prob:"past", q:"부분 함수 종속을 제거하여 완전 함수 종속을 성립시키는 정규형은?", a:"제2정규형 (2NF)", e:"1NF 만족 + 기본키 전체에 함수 종속."},
    {type:"short", prob:"past", q:"이행 함수 종속을 제거하여 만족하는 정규형은?", a:"제3정규형 (3NF)", e:"A→B, B→C일 때 A→C 성립 = 이행 함수 종속. 이를 제거."},

============================================================ */
function normalize(s) {
  return (s || '').toString().toLowerCase()
    .replace(/\s+/g, '')
    .replace(/[.,()·\-'"'":;!?%&\[\]{}~～]/g, '');
}
function escapeHtml(s) {
  return (s || '').toString().replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// 정답 문자열을 괄호 밖 쉼표 기준으로 '항목'들로 분리
function parseAnswerItems(correctAns) {
  let depth = 0, current = '';
  const items = [];
  for (const ch of correctAns) {
    if (ch === '(') depth++;
    else if (ch === ')') depth = Math.max(0, depth - 1);
    if ((ch === ',' || ch === '、') && depth === 0) {
      if (current.trim()) items.push(current.trim());
      current = '';
    } else current += ch;
  }
  if (current.trim()) items.push(current.trim());
  return items;
}

// 한 항목에서 허용 가능한 정답 형태들 추출
// 예: "OUTER JOIN (외부 조인)" → {"outerjoin외부조인","outerjoin","외부조인"}
// 예: "INTERSECT / 교집합" → {"intersect","교집합"}
function getAcceptableForms(item) {
  const forms = new Set();
  const alternatives = item.split(/\s*\/\s*|\s*또는\s*/);
  alternatives.forEach(alt => {
    const t = alt.trim();
    if (!t) return;
    const full = normalize(t);
    if (full) forms.add(full);
    const noParens = t.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
    if (noParens) forms.add(normalize(noParens));
    const matches = [...t.matchAll(/\(([^)]+)\)/g)];
    matches.forEach(m => {
      const inner = m[1].trim();
      if (inner) forms.add(normalize(inner));
    });
  });
  return forms;
}

// 단답형 채점
// - 항목이 1개면 정확히 일치해야 정답. 답이 긴 구문이면 needConfirm=true 반환(수동 확정)
// - 항목이 여러 개면 모든 항목이 사용자 답에 포함되어야 정답
function checkAnswer(userAns, correctAns) {
  const u = normalize(userAns);
  if (!u) return { match: false, needConfirm: false };
  const items = parseAnswerItems(correctAns);
  if (items.length === 0) return { match: false, needConfirm: false };

  if (items.length === 1) {
    const forms = getAcceptableForms(items[0]);
    for (const f of forms) if (u === f) return { match: true, needConfirm: false };
    const maxLen = Math.max(0, ...[...forms].map(f => f.length));
    if (maxLen > 20) return { match: false, needConfirm: true };
    return { match: false, needConfirm: false };
  }

  const allMatched = items.every(item => {
    const forms = getAcceptableForms(item);
    for (const f of forms) if (f.length >= 1 && u.includes(f)) return true;
    return false;
  });
  return { match: allMatched, needConfirm: false };
}

function quizKey(subject, idx) { return 'Q::' + subject + '::' + idx; }
function pastKey(yr, idx) { return 'P::' + yr + '::' + idx; }

/* ============================================================
   NAV
============================================================ */
document.getElementById('navQuiz').onclick = () => { mode = 'quiz'; render(); };
document.getElementById('navPast').onclick = () => { mode = 'past'; render(); };
document.getElementById('navReview').onclick = () => { mode = 'review'; render(); };

/* ============================================================
   RENDER: QUESTION CARD
============================================================ */
function renderQuestionCard(container, opts) {
  const { key, q, meta, badges } = opts;
  const saved = state.answers[key] || state.pastAnswers[key];
  const card = document.createElement('div');
  card.className = 'q-card' + (saved ? (saved.correct ? ' is-correct' : ' is-wrong') : '');

  const metaEl = document.createElement('div');
  metaEl.className = 'q-meta';
  let metaHtml = `<span class="q-num">${meta.numLabel}</span>`;
  if (badges) badges.forEach(b => {
    metaHtml += `<span class="badge ${b.cls}">${b.label}</span>`;
  });
  metaEl.innerHTML = metaHtml;
  card.appendChild(metaEl);

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.textContent = q.q;
  card.appendChild(qText);

  const input = q.type === 'desc'
    ? Object.assign(document.createElement('textarea'), { className: 'input' })
    : Object.assign(document.createElement('input'), { className: 'input', type: 'text' });
  input.placeholder = '답을 입력하세요';
  if (saved) input.value = saved.userAnswer;
  card.appendChild(input);

  const actions = document.createElement('div');
  actions.className = 'actions';
  const submitBtn = Object.assign(document.createElement('button'), { className: 'btn btn-primary', textContent: '제출' });
  const revealBtn = Object.assign(document.createElement('button'), { className: 'btn btn-secondary', textContent: '정답 보기' });
  const resetBtn = Object.assign(document.createElement('button'), { className: 'btn btn-ghost', textContent: '다시 풀기' });
  actions.appendChild(submitBtn);
  actions.appendChild(revealBtn);
  actions.appendChild(resetBtn);
  card.appendChild(actions);

  const result = document.createElement('div');
  result.className = 'result';
  card.appendChild(result);

  function showResult(isCorrect, showStatus, userAnswer) {
    result.classList.add('show');
    result.classList.remove('r-correct', 'r-wrong');
    const userBlock = userAnswer
      ? `<div class="r-line"><strong>내 답변:</strong> ${escapeHtml(userAnswer)}</div>`
      : '';
    if (showStatus) {
      result.classList.add(isCorrect ? 'r-correct' : 'r-wrong');
      const toggleLabel = isCorrect ? '오답으로 수정' : '정답으로 수정';
      result.innerHTML = `
        <div class="r-status">${isCorrect ? '✓ 정답이에요' : '✗ 아쉬워요'}</div>
        ${userBlock}
        <div class="r-answer">${q.a}</div>
        <div class="r-explain">${q.e}</div>
        <div style="margin-top:10px;text-align:right;">
          <button class="btn btn-ghost r-toggle" style="font-size:12px;padding:4px 10px;">${toggleLabel}</button>
        </div>`;
      const toggleBtn = result.querySelector('.r-toggle');
      if (toggleBtn) toggleBtn.onclick = () => {
        const stored = opts.store === 'past' ? state.pastAnswers[key] : state.answers[key];
        if (!stored) return;
        stored.correct = !stored.correct;
        saveState();
        showResult(stored.correct, true, stored.userAnswer);
        updateStats();
      };
    } else {
      result.innerHTML = `
        <div class="r-status" style="color:var(--text-secondary)">정답</div>
        <div class="r-answer">${q.a}</div>
        <div class="r-explain">${q.e}</div>`;
    }
    card.classList.remove('is-correct', 'is-wrong');
    if (showStatus) card.classList.add(isCorrect ? 'is-correct' : 'is-wrong');
  }

  if (saved) showResult(saved.correct, true, saved.userAnswer);

  submitBtn.onclick = () => {
    const userAns = input.value.trim();
    if (!userAns) { alert('답을 입력해주세요.'); return; }
    const isDesc = q.type === 'desc';
    let isCorrect;
    if (isDesc) {
      isCorrect = confirm(`서술형은 자동 채점이 어려워요.\n\n내 답변:\n${userAns}\n\n모범 답안:\n${q.a}\n\n맞다고 생각하면 [확인], 아니면 [취소]`);
    } else {
      const { match, needConfirm } = checkAnswer(userAns, q.a);
      if (match) isCorrect = true;
      else if (needConfirm) {
        isCorrect = confirm(`답안이 길어 자동 채점이 어려워요.\n\n내 답변:\n${userAns}\n\n모범 답안:\n${q.a}\n\n맞다고 생각하면 [확인], 아니면 [취소]`);
      } else isCorrect = false;
    }
    if (opts.store === 'past') state.pastAnswers[key] = { userAnswer: userAns, correct: isCorrect, year: opts.year, round: opts.round };
    else state.answers[key] = { userAnswer: userAns, correct: isCorrect, subject: opts.subject };
    saveState();
    showResult(isCorrect, true, userAns);
    updateStats();
  };
  revealBtn.onclick = () => showResult(false, false);
  resetBtn.onclick = () => {
    if (opts.store === 'past') delete state.pastAnswers[key];
    else delete state.answers[key];
    saveState();
    input.value = '';
    result.classList.remove('show', 'r-correct', 'r-wrong');
    card.classList.remove('is-correct', 'is-wrong');
    updateStats();
  };

  container.appendChild(card);
}

/* ============================================================
   PAGE: QUIZ
============================================================ */
function renderQuizPage() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(statsBlock());

  const pageHeader = document.createElement('div');
  pageHeader.className = 'page-header';
  pageHeader.innerHTML = `<div class="page-title">과목별 퀴즈</div>
    <div class="page-sub">30문제씩, 단답형 및 서술형 · 정답과 풀이 포함</div>`;
  app.appendChild(pageHeader);

  const tabs = document.createElement('div');
  tabs.className = 'tabs';
  subjects.forEach(s => {
    const t = document.createElement('button');
    t.className = 'tab' + (currentSubject === s ? ' active' : '');
    t.textContent = s;
    t.onclick = () => { currentSubject = s; probFilter = 'all'; render(); };
    tabs.appendChild(t);
  });
  app.appendChild(tabs);

  const chips = document.createElement('div');
  chips.className = 'chips';
  const counts = { all: quizData[currentSubject].length };
  Object.keys(PROB_META).forEach(k => counts[k] = 0);
  quizData[currentSubject].forEach(q => counts[q.prob] = (counts[q.prob] || 0) + 1);

  [['all', '전체'], ...Object.entries(PROB_META).map(([k, m]) => [k, m.label])]
    .forEach(([key, label]) => {
      const c = document.createElement('button');
      c.className = 'chip' + (probFilter === key ? ' active' : '');
      c.innerHTML = `${label}<span class="count">${counts[key] || 0}</span>`;
      c.onclick = () => { probFilter = key; render(); };
      chips.appendChild(c);
    });
  app.appendChild(chips);

  const filtered = quizData[currentSubject]
    .map((q, i) => ({ q, i }))
    .filter(({ q }) => probFilter === 'all' || q.prob === probFilter);

  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '해당하는 문제가 없어요';
    app.appendChild(empty);
    return;
  }
  filtered.forEach(({ q, i }) => {
    const m = PROB_META[q.prob] || { label: '', cls: 'bg-gray' };
    renderQuestionCard(app, {
      key: quizKey(currentSubject, i),
      q, store: 'quiz', subject: currentSubject,
      meta: { numLabel: `#${i + 1}` },
      badges: [
        { label: q.type === 'short' ? '단답형' : '서술형', cls: q.type === 'desc' ? 'bg-blue' : 'bg-gray' },
        { label: m.label, cls: m.cls }
      ]
    });
  });
}

/* ============================================================
   PAGE: PAST EXAM
============================================================ */
function renderPastPage() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(statsBlock());

  const pageHeader = document.createElement('div');
  pageHeader.className = 'page-header';
  pageHeader.innerHTML = `<div class="page-title">기출문제</div>
    <div class="page-sub">연도와 회차를 선택해 풀어보세요</div>`;
  app.appendChild(pageHeader);

  const years = Array.from(new Set(pastKeys.map(k => k.split('-')[0]))).sort().reverse();
  const yearTabs = document.createElement('div');
  yearTabs.className = 'tabs';
  years.forEach(yr => {
    const t = document.createElement('button');
    t.className = 'tab' + (currentYear === yr ? ' active' : '');
    t.textContent = yr + '년';
    t.onclick = () => { currentYear = yr; currentRound = 'all'; render(); };
    yearTabs.appendChild(t);
  });
  app.appendChild(yearTabs);

  const rounds = pastKeys.filter(k => k.startsWith(currentYear + '-')).map(k => k.split('-')[1]).sort();
  const chips = document.createElement('div');
  chips.className = 'chips';
  const all = document.createElement('button');
  all.className = 'chip' + (currentRound === 'all' ? ' active' : '');
  const totalCount = rounds.reduce((sum, r) => sum + (pastExamData[currentYear + '-' + r]?.length || 0), 0);
  all.innerHTML = `전체<span class="count">${totalCount}</span>`;
  all.onclick = () => { currentRound = 'all'; render(); };
  chips.appendChild(all);
  rounds.forEach(r => {
    const c = document.createElement('button');
    c.className = 'chip' + (currentRound === r ? ' active' : '');
    const n = pastExamData[currentYear + '-' + r]?.length || 0;
    c.innerHTML = `${r}회<span class="count">${n}</span>`;
    c.onclick = () => { currentRound = r; render(); };
    chips.appendChild(c);
  });
  app.appendChild(chips);

  const list = currentRound === 'all' ? rounds : [currentRound];
  list.forEach(r => {
    if (list.length > 1) {
      const sh = document.createElement('div');
      sh.className = 'sub-header';
      sh.textContent = `${currentYear}년 ${r}회`;
      app.appendChild(sh);
    }
    const yr = currentYear + '-' + r;
    (pastExamData[yr] || []).forEach((q, i) => {
      renderQuestionCard(app, {
        key: pastKey(yr, i),
        q: { ...q, type: 'short' },
        store: 'past', year: yr, round: r,
        meta: { numLabel: `${currentYear}년 ${r}회 · #${i + 1}` },
        badges: [{ label: '기출', cls: 'bg-red' }]
      });
    });
  });
}

/* ============================================================
   PAGE: REVIEW
============================================================ */
function renderReviewPage() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(statsBlock());

  const pageHeader = document.createElement('div');
  pageHeader.className = 'page-header';
  pageHeader.innerHTML = `<div class="page-title">복습</div>
    <div class="page-sub">맞춘 문제와 틀린 문제를 모아 보세요</div>`;
  app.appendChild(pageHeader);

  const sourceChips = document.createElement('div');
  sourceChips.className = 'chips';
  [['all', '전체'], ['quiz', '퀴즈'], ['past', '기출']].forEach(([key, label]) => {
    const c = document.createElement('button');
    c.className = 'chip' + (reviewSource === key ? ' active' : '');
    c.textContent = label;
    c.onclick = () => { reviewSource = key; render(); };
    sourceChips.appendChild(c);
  });
  app.appendChild(sourceChips);

  const chips = document.createElement('div');
  chips.className = 'chips';
  [['all', '전체 푼 문제'], ['correct', '✓ 맞춘 문제'], ['wrong', '✗ 틀린 문제']].forEach(([key, label]) => {
    const c = document.createElement('button');
    c.className = 'chip' + (reviewFilter === key ? ' active' : '');
    c.textContent = label;
    c.onclick = () => { reviewFilter = key; render(); };
    chips.appendChild(c);
  });
  app.appendChild(chips);

  let count = 0;

  if (reviewSource === 'all' || reviewSource === 'quiz') {
    subjects.forEach(subject => {
      quizData[subject].forEach((q, i) => {
        const key = quizKey(subject, i);
        const saved = state.answers[key];
        if (!saved) return;
        if (reviewFilter === 'correct' && !saved.correct) return;
        if (reviewFilter === 'wrong' && saved.correct) return;
        const m = PROB_META[q.prob] || { label: '', cls: 'bg-gray' };
        renderQuestionCard(app, {
          key, q, store: 'quiz', subject,
          meta: { numLabel: `${subject} · #${i + 1}` },
          badges: [
            { label: q.type === 'short' ? '단답형' : '서술형', cls: q.type === 'desc' ? 'bg-blue' : 'bg-gray' },
            { label: m.label, cls: m.cls }
          ]
        });
        count++;
      });
    });
  }

  if (reviewSource === 'all' || reviewSource === 'past') {
    pastKeys.forEach(yr => {
      (pastExamData[yr] || []).forEach((q, i) => {
        const key = pastKey(yr, i);
        const saved = state.pastAnswers[key];
        if (!saved) return;
        if (reviewFilter === 'correct' && !saved.correct) return;
        if (reviewFilter === 'wrong' && saved.correct) return;
        const [y, r] = yr.split('-');
        renderQuestionCard(app, {
          key, q: { ...q, type: 'short' }, store: 'past', year: yr, round: r,
          meta: { numLabel: `${y}년 ${r}회 · #${i + 1}` },
          badges: [{ label: '기출', cls: 'bg-red' }]
        });
        count++;
      });
    });
  }

  if (count === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = reviewFilter === 'all'
      ? '아직 푼 문제가 없어요'
      : (reviewFilter === 'correct' ? '맞춘 문제가 아직 없어요' : '틀린 문제가 없어요');
    app.appendChild(empty);
  }
}

/* ============================================================
   STATS BLOCK
============================================================ */
function statsBlock() {
  let total = 0, solved = 0, correct = 0;
  subjects.forEach(s => quizData[s].forEach((q, i) => {
    total++;
    const saved = state.answers[quizKey(s, i)];
    if (saved) { solved++; if (saved.correct) correct++; }
  }));
  pastKeys.forEach(yr => (pastExamData[yr] || []).forEach((q, i) => {
    total++;
    const saved = state.pastAnswers[pastKey(yr, i)];
    if (saved) { solved++; if (saved.correct) correct++; }
  }));
  const wrong = solved - correct;
  const rate = solved > 0 ? Math.round((correct / solved) * 100) : 0;

  const wrap = document.createElement('div');
  wrap.className = 'stats-row';
  wrap.innerHTML = `
    <div class="stat-item"><div class="stat-label">전체 문제</div><div class="stat-value">${total}</div></div>
    <div class="stat-item"><div class="stat-label">푼 문제</div><div class="stat-value">${solved}</div></div>
    <div class="stat-item"><div class="stat-label">맞춘 문제</div><div class="stat-value v-correct">${correct}</div></div>
    <div class="stat-item"><div class="stat-label">틀린 문제</div><div class="stat-value v-wrong">${wrong}</div></div>
    <div class="stat-item">
      <div class="stat-label">정답률</div>
      <div class="stat-value">${rate}%</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${rate}%"></div></div>
    </div>`;
  return wrap;
}
function updateStats() {
  // Re-render the stats row only by refreshing whole page (simple and safe)
  render(true);
}

/* ============================================================
   TOP NAV ACTIVE STATE
============================================================ */
function updateNavActive() {
  ['navQuiz', 'navPast', 'navReview'].forEach(id => document.getElementById(id).classList.remove('active'));
  if (mode === 'quiz') document.getElementById('navQuiz').classList.add('active');
  else if (mode === 'past') document.getElementById('navPast').classList.add('active');
  else document.getElementById('navReview').classList.add('active');
}

/* ============================================================
   RENDER
============================================================ */
function render(preserveScroll = false) {
  const prevY = window.scrollY;
  updateNavActive();
  if (mode === 'quiz') renderQuizPage();
  else if (mode === 'past') renderPastPage();
  else renderReviewPage();
  window.scrollTo({ top: preserveScroll ? prevY : 0, behavior: 'instant' });
}

render();
</script>
